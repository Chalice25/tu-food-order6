<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU SMART PINTO - Student Side</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .step { display: none; }
        .step.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .healthy-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    </style>
</head>
<body class="text-gray-800">

    <div class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <header class="bg-white border-b sticky top-0 z-50 p-4 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-white font-bold">TU</div>
                <div>
                    <h1 class="font-black text-gray-800 text-lg leading-none">SMART PINTO</h1>
                    <p class="text-[9px] text-green-600 font-bold uppercase tracking-widest mt-1">Zero Waste Edition</p>
                </div>
            </div>
            <div id="statusHeader" class="text-right hidden">
                <p class="text-[9px] font-bold text-gray-400 uppercase">Student ID</p>
                <p id="displayStuId" class="text-xs font-black text-red-600"></p>
            </div>
        </header>

        <main class="p-6 flex-grow">
            <div id="step1" class="step active">
                <div class="text-center mt-12 mb-10">
                    <div class="text-5xl mb-4">🍱</div>
                    <h2 class="text-3xl font-black text-gray-800 uppercase tracking-tighter">Login</h2>
                    <p class="text-gray-400 mt-2 italic font-medium">เข้าใช้งานด้วยรหัสนักศึกษา 10 หลัก</p>
                </div>
                <div class="space-y-4 bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-100">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Student ID Number</label>
                        <input type="number" id="stuIdInput" placeholder="6xxxxxxxx-x" class="w-full bg-gray-50 border-2 border-transparent focus:border-red-500 focus:bg-white p-4 rounded-2xl outline-none transition-all text-center text-xl font-black tracking-widest mt-1">
                    </div>
                    <button onclick="login()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-red-100 transition-all active:scale-95 uppercase">เข้าสู่ระบบ</button>
                </div>
            </div>

            <div id="step2" class="step">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-2xl font-black italic text-gray-800 leading-none">Menu & Nutrition</h2>
                </div>
                <div id="menuList" class="grid gap-5">
                    </div>
            </div>

            <div id="step3" class="step">
                <div class="bg-white p-8 rounded-[3rem] shadow-2xl border-4 border-green-500 text-center relative overflow-hidden">
                    <div class="bg-green-500 h-2 w-full absolute top-0 left-0"></div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-4 italic">Your Queue Number</p>
                    <div id="qNumber" class="text-[6rem] font-black text-gray-900 leading-none my-4 tracking-tighter italic">--</div>
                    
                    <div class="bg-slate-100 p-5 rounded-2xl mb-8 border border-slate-200">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Pinto Assigned</p>
                        <p id="pintoIdStatus" class="text-xl font-black text-blue-600 italic">รอแม่ค้าสแกนปิ่นโต...</p>
                    </div>

                    <button onclick="goToStep(4)" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">
                        ทานเสร็จแล้ว คลิกเพื่อคืน
                    </button>
                </div>
            </div>

            <div id="step4" class="step text-center">
                <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-gray-100">
                    <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-black text-gray-800 mb-2 italic">Scan to Return</h2>
                    <p class="text-gray-400 text-sm mb-8">กรุณากรอกรหัสปิ่นโตที่จุดคืนอาหาร</p>
                    
                    <input type="text" id="returnPintoID" placeholder="เช่น TU-123" class="w-full border-2 border-gray-100 p-4 rounded-2xl mb-4 text-center font-black text-2xl outline-none focus:border-green-500 uppercase">
                    
                    <button onclick="submitReturn()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-green-100 active:scale-95 transition-all">ยืนยันการคืน</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ใช้ Firebase Config เดิมของคุณ
        const firebaseConfig = {
            apiKey: "AIzaSyABsq6uGZYQnYHO1B9BlBiFOv2JWjRLDIs",
            authDomain: "tu-smart-pinto.firebaseapp.com",
            projectId: "tu-smart-pinto",
            storageBucket: "tu-smart-pinto.firebasestorage.app",
            messagingSenderId: "656002336534",
            appId: "1:656002336534:web:f257eba8e45de7b8a53237",
            measurementId: "G-N7MR779H9P"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentStuId = "";

        // ข้อมูลโภชนาการแบบละเอียด
        const menuData = [
            { id: 101, name: "ข้าวมันไก่ต้ม (ไม่หนัง)", kcal: "420 kcal", isHealthy: true, price: 50, info: "High Protein / Low Fat" },
            { id: 102, name: "อกไก่ย่างสมุนไพร + ข้าวไรซ์เบอร์รี่", kcal: "280 kcal", isHealthy: true, price: 65, info: "Clean Food / 0% Sugar added" },
            { id: 103, name: "ข้าวมันไก่ผสม (ต้ม+ทอด)", kcal: "580 kcal", isHealthy: false, price: 60, info: "Classic Taste" },
            { id: 104, name: "กะเพราอกไก่สับ (ลดเค็ม)", kcal: "390 kcal", isHealthy: true, price: 45, info: "Low Sodium Option" }
        ];

        function login() {
            const id = document.getElementById('stuIdInput').value;
            if(id.length < 10) return alert("กรุณากรอกรหัสนักศึกษาให้ครบ 10 หลัก");
            currentStuId = id;
            document.getElementById('displayStuId').innerText = id;
            document.getElementById('statusHeader').classList.remove('hidden');
            goToStep(2);
            renderMenu();
            listenToOrder();
        }

        function goToStep(num) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + num).classList.add('active');
            window.scrollTo(0,0);
        }

        function renderMenu() {
            const list = document.getElementById('menuList');
            list.innerHTML = menuData.map(m => `
                <div class="bg-white p-6 rounded-[2.5rem] border-2 ${m.isHealthy ? 'border-green-100 shadow-green-50' : 'border-gray-50 shadow-gray-50'} shadow-xl relative overflow-hidden transition-all hover:scale-[1.02]">
                    ${m.isHealthy ? '<div class="absolute top-0 right-0 bg-green-500 text-white text-[9px] px-3 py-1 rounded-bl-xl font-bold uppercase tracking-widest italic shadow-sm">Healthy Choice</div>' : ''}
                    
                    <div class="mb-1">
                        <h3 class="font-black text-xl text-gray-800 leading-tight">${m.name}</h3>
                        <p class="text-[10px] font-bold text-gray-400 mt-1 uppercase tracking-wider">${m.info}</p>
                    </div>

                    <div class="flex gap-2 items-center my-3">
                        <span class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">🔥 ${m.kcal}</span>
                    </div>

                    <div class="flex justify-between items-center mt-4 border-t pt-4">
                        <span class="text-3xl font-black text-red-600 leading-none">${m.price} <span class="text-sm">฿</span></span>
                        <button onclick="placeOrder('${m.name}')" class="bg-gray-900 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase italic tracking-widest shadow-lg active:scale-95 transition-all">Order</button>
                    </div>
                </div>
            `).join('');
        }

        function placeOrder(name) {
            const q = "A-" + Math.floor(Math.random() * 99);
            document.getElementById('qNumber').innerText = q;
            // ส่งข้อมูลไป Firebase โดยใช้รหัสนักศึกษาเป็น Key
            db.ref('orders/' + currentStuId).set({
                stuId: currentStuId,
                menu: name,
                status: "Pending",
                pintoId: "",
                queue: q,
                timestamp: Date.now()
            });
            goToStep(3);
        }

        function listenToOrder() {
            // ฟังข้อมูล Real-time เฉพาะออเดอร์ของรหัสนักศึกษานี้
            db.ref('orders/' + currentStuId).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data && data.pintoId) {
                    const statusEl = document.getElementById('pintoIdStatus');
                    statusEl.innerText = "TU-PINTO: " + data.pintoId.toUpperCase();
                    statusEl.className = "text-xl font-black text-green-600 italic text-center animate-bounce";
                }
            });
        }

        function submitReturn() {
            const pid = document.getElementById('returnPintoID').value;
            if(!pid) return alert("กรุณากรอกรหัสปิ่นโตเพื่อคืน");
            
            // ลบข้อมูลออเดอร์เมื่อคืนสำเร็จ (หรือจะเปลี่ยนสถานะเป็น Returned ก็ได้)
            db.ref('orders/' + currentStuId).remove();
            alert("คืนปิ่นโตสำเร็จ! ขอบคุณที่ร่วมลดขยะให้ มธ. (ได้รับ +50 Points)");
            location.reload();
        }
    </script>
</body>
</html>

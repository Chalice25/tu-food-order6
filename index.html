<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU SMART PINTO - Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .step { display: none; }
        .step.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-800">

    <div class="max-w-md mx-auto min-h-screen flex flex-col relative">
        <header class="bg-white border-b sticky top-0 z-50 p-4 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center text-white font-bold">TU</div>
                <h1 class="font-black text-gray-800 text-lg">SMART PINTO</h1>
            </div>
            <div id="statusHeader" class="text-right hidden text-[10px] font-bold text-gray-400">
                STU-ID: <span id="displayStuId" class="text-red-600"></span>
            </div>
        </header>

        <main class="p-6 flex-grow">
            <div id="step1" class="step active">
                <div class="text-center mt-12 mb-10">
                    <h2 class="text-3xl font-black text-gray-800 italic uppercase">Login</h2>
                    <p class="text-gray-400 mt-2">กรอกรหัสนักศึกษาเพื่อเริ่มสั่งอาหาร</p>
                </div>
                <div class="space-y-4 bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-100">
                    <input type="number" id="stuIdInput" placeholder="รหัสนักศึกษา 10 หลัก" class="w-full bg-gray-50 border-2 border-transparent focus:border-red-500 focus:bg-white p-4 rounded-2xl outline-none text-center text-xl font-bold">
                    <button onclick="login()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl uppercase">เข้าสู่ระบบ</button>
                </div>
            </div>

            <div id="step2" class="step">
                <h2 class="text-2xl font-black mb-6 italic text-gray-700">Healthy Menu</h2>
                <div id="menuList" class="grid gap-4"></div>
            </div>

            <div id="step3" class="step">
                <div class="bg-white p-8 rounded-[3rem] shadow-2xl border-4 border-green-500 text-center relative overflow-hidden">
                    <div class="bg-green-500 h-2 w-full absolute top-0 left-0"></div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase mt-4 italic text-center">Your Queue Number</p>
                    <div id="qNumber" class="text-[6rem] font-black text-gray-900 leading-none my-4 tracking-tighter italic">--</div>
                    
                    <div class="bg-slate-100 p-5 rounded-2xl mb-8 border border-slate-200">
                        <p class="text-[10px] font-bold text-slate-400 uppercase text-center">Pinto Assigned</p>
                        <p id="pintoIdStatus" class="text-xl font-black text-blue-600 italic">รอแม่ค้าสแกนปิ่นโต...</p>
                    </div>

                    <button onclick="goToStep(4)" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black">ทานเสร็จแล้ว คลิกเพื่อคืน</button>
                </div>
            </div>

            <div id="step4" class="step">
                <div class="bg-white p-8 rounded-[3rem] shadow-xl text-center">
                    <h2 class="text-2xl font-black text-gray-800 mb-6 italic text-center">Scan to Return</h2>
                    <input type="text" id="returnPintoID" placeholder="กรอกรหัสปิ่นโตเพื่อคืน" class="w-full border-2 border-gray-100 p-4 rounded-2xl mb-4 text-center font-bold">
                    <button onclick="submitReturn()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-lg">ยืนยันการคืน</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ผมใส่ Config จากรูปของคุณให้แล้วครับ
        const firebaseConfig = {
            apiKey: "AIzaSyABsq6uGZYQnYHO1B9BlBiFOv2JWjRLDIs",
            authDomain: "tu-smart-pinto.firebaseapp.com",
            projectId: "tu-smart-pinto",
            storageBucket: "tu-smart-pinto.firebasestorage.app",
            messagingSenderId: "656002336534",
            appId: "1:656002336534:web:f257eba8e45de7b8a53237",
            measurementId: "G-N7MR779H9P"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentStuId = "";
        const menuData = [
            { name: "ข้าวมันไก่ต้ม", kcal: "420 kcal", isHealthy: true, price: 50 },
            { name: "อกไก่ย่างสมุนไพร", kcal: "280 kcal", isHealthy: true, price: 65, note: "High Protein" },
            { name: "กะเพราไก่สับ (ลดเค็ม)", kcal: "410 kcal", isHealthy: true, price: 45 }
        ];

        function login() {
            const id = document.getElementById('stuIdInput').value;
            if(id.length < 5) return alert("กรุณากรอกรหัสประจำตัว");
            currentStuId = id;
            document.getElementById('displayStuId').innerText = id;
            document.getElementById('statusHeader').classList.remove('hidden');
            goToStep(2);
            renderMenu();
            listenToOrder();
        }

        function goToStep(num) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + num).classList.add('active');
        }

        function renderMenu() {
            const list = document.getElementById('menuList');
            list.innerHTML = menuData.map(m => `
                <div class="bg-white p-6 rounded-[2rem] border-2 ${m.isHealthy ? 'border-green-100' : 'border-gray-50'} shadow-sm relative overflow-hidden">
                    ${m.isHealthy ? '<span class="absolute top-0 right-0 bg-green-500 text-white text-[10px] px-3 py-1 rounded-bl-xl font-bold uppercase tracking-tighter italic">Healthy</span>' : ''}
                    <h3 class="font-black text-xl text-gray-800">${m.name}</h3>
                    <p class="text-xs font-bold text-gray-400 italic">🔥 ${m.kcal} ${m.note ? '| #'+m.note : ''}</p>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-2xl font-black text-red-600">${m.price} ฿</span>
                        <button onclick="placeOrder('${m.name}')" class="bg-gray-900 text-white px-6 py-2 rounded-xl font-bold text-xs">ORDER</button>
                    </div>
                </div>
            `).join('');
        }

        function placeOrder(name) {
            const q = "A-" + Math.floor(Math.random() * 99);
            document.getElementById('qNumber').innerText = q;
            db.ref('orders/' + currentStuId).set({
                stuId: currentStuId,
                menu: name,
                status: "Pending",
                pintoId: "",
                queue: q
            });
            goToStep(3);
        }

        function listenToOrder() {
            db.ref('orders/' + currentStuId).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data && data.pintoId) {
                    const statusEl = document.getElementById('pintoIdStatus');
                    statusEl.innerText = "TU-PINTO: " + data.pintoId;
                    statusEl.className = "text-xl font-black text-green-600 italic text-center";
                }
            });
        }

        function submitReturn() {
            const pid = document.getElementById('returnPintoID').value;
            if(!pid) return alert("กรุณาระบุรหัสปิ่นโต");
            db.ref('orders/' + currentStuId).remove();
            alert("คืนสำเร็จ!");
            location.reload();
        }
    </script>
</body>
</html>
